<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>التقارير المختومة</title>

<style>
:root {
  --bg: #f9fafb;
  --card-bg: #ffffff;
  --border: #e2e8f0;
  --text: #0f172a;
  --text-light: #475569;
  --accent: #2563eb;
  --accent-soft: #eef2ff;
  --radius: 16px;
  --radius-lg: 22px;
  --shadow: 0 12px 32px rgba(15,23,42,0.08);
  --shadow-soft: 0 8px 20px rgba(15,23,42,0.06);
  --shadow-card: 0 14px 40px rgba(15,23,42,0.05);
}

body {
  font-family: system-ui, -apple-system, "Noto Kufi Arabic", "Segoe UI", sans-serif;
  background:
    radial-gradient(1000px 600px at 90% -10%, #dbeafe 0%, transparent 55%),
    linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
  color: var(--text);
  margin: 0;
  padding: 22px;
  line-height: 1.7;
}

/* ===================== الحاوية العامة ===================== */
.container {
  max-width: 1100px;
  margin: 0 auto;
}

/* ===================== الهيدر ===================== */
.header {
  margin-bottom: 24px;
}

.header h1 {
  margin: 0;
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
}

.subtitle {
  margin: 8px 0 14px;
  color: var(--text-light);
  font-size: 15px;
}

.header-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 18px;
  border-radius: var(--radius);
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  font-size: 14px;
  transition: 0.18s ease;
  border: 1px solid transparent;
}

.btn:hover {
  transform: translateY(-2px);
}

.btn:active {
  transform: translateY(0);
}

.btn.primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 10px 22px rgba(37, 99, 235, 0.18);
}

.btn.primary:hover {
  background: #1d4ed8;
}

.btn.secondary {
  background: #0ea5e9;
  color: #fff;
}

.btn.secondary:hover {
  background: #0284c7;
}

/* ===================== الكروت العامة ===================== */
.card {
  background: var(--card-bg);
  padding: 20px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-card);
  margin-bottom: 20px;
}

/* ===================== البحث ===================== */
.label {
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text);
}

input[type=search] {
  width: 100%;
  padding: 13px;
  border-radius: var(--radius);
  border: 1px solid #cbd5e1;
  background: #f8fafc;
  font-size: 14px;
  transition: 0.2s;
}

input[type=search]:focus {
  outline: none;
  border-color: var(--accent);
  background: #fff;
  box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
}

.meta-row {
  margin-top: 10px;
  color: var(--text-light);
  font-size: 15px;
}

/* ===================== قائمة التقارير ===================== */
.reports-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.report-card {
  background: #fff;
  padding: 18px 20px;
  border-radius: var(--radius);
  border: 1px solid #e2e8f0;
  box-shadow: var(--shadow-soft);
}

.report-head {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
}

.report-name {
  font-weight: 800;
  color: var(--text);
  font-size: 17px;
}

.report-badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.badge {
  background: var(--accent-soft);
  color: #1e40af;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
}

.report-meta {
  margin-top: 6px;
  font-size: 14px;
  color: var(--text-light);
}

.report-meta code {
  background: #e2e8f0;
  padding: 4px 6px;
  border-radius: 6px;
  font-size: 13px;
  direction: ltr;
}

.label-text {
  font-weight: 700;
  color: var(--text);
  margin-inline-end: 6px;
}

/* ===================== أزرار كل تقرير ===================== */
.report-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.mini-btn {
  padding: 10px 14px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 14px;
  border: 1px solid var(--accent);
  color: var(--accent);
  background: #fff;
  text-decoration: none;
  transition: 0.18s ease;
}

.mini-btn:hover {
  background: #eef2ff;
}

.mini-btn.ghost {
  border-color: #cbd5e1;
  color: var(--text);
}

/* ===================== موبايل ===================== */
@media (max-width:640px) {
  .header h1 { font-size: 24px; }
  .mini-btn { width: 100%; justify-content: center; }
}
</style>
</head>


<body>

<div class="container">

  <!-- ----------------- الهيدر ----------------- -->
  <div class="header">
    <h1>التقارير المختومة</h1>
    <p class="subtitle">عرض جميع التقارير التي تم ختمها مع إمكانية البحث برقم التقرير أو اسم الملف.</p>

    <div class="header-actions">
      <a class="btn primary" href="/">العودة للصفحة الرئيسية</a>
      <button class="btn secondary" id="refreshBtn">تحديث القائمة</button>
    </div>
  </div>

  <!-- ----------------- البحث ----------------- -->
  <div class="card">
    <label class="label" for="searchInput">ابحث برقم التقرير أو اسم الملف</label>
    <input type="search" id="searchInput" placeholder="مثال: التقرير رقم 123 أو اسم الملف">
    <div class="meta-row">إجمالي التقارير: <strong id="totalCount">0</strong></div>
  </div>

  <!-- ----------------- قائمة التقارير ----------------- -->
  <div class="card">
    <div id="statusMessage" class="status"></div>
    <div id="reportsList" class="reports-list"></div>
  </div>

</div>

<!-- ===================== السكربت – بدون تغيير ===================== -->

<script>
const API_BASE = (location && (location.protocol === 'file:' || location.origin === 'null')) ? 'http://localhost:3000' : '';
const reportsListEl = document.getElementById('reportsList');
const statusEl = document.getElementById('statusMessage');
const totalCountEl = document.getElementById('totalCount');
const searchInput = document.getElementById('searchInput');
const refreshBtn = document.getElementById('refreshBtn');
let allReports = [];

// --- تنسيق التاريخ ---
function formatDate(value){
  if (!value) return 'غير متوفر';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return 'غير متوفر';
  try {
    return new Intl.DateTimeFormat('ar', { dateStyle:'medium', timeStyle:'short' }).format(d);
  } catch(_) {
    return d.toLocaleString();
  }
}

// --- عرض التقارير ---
function render(list){
  reportsListEl.innerHTML = '';
  totalCountEl.textContent = list.length;

  if(!list.length){
    statusEl.textContent = 'لا توجد تقارير مطابقة.';
    return;
  }

  statusEl.textContent = '';

  list.forEach(report => {
    const card = document.createElement('div');
    card.className = 'report-card';

    const viewUrl = report.fileUrl || ((API_BASE || '') + '/verify?hash=' + encodeURIComponent(report.hash));
    const verifyUrl = (API_BASE || '') + '/verify?hash=' + encodeURIComponent(report.hash);

    card.innerHTML = `
      <div class="report-head">
        <div class="report-name">${report.fileName || 'ملف بدون اسم'}</div>
        <div class="report-badges">
          <span class="badge">${report.status || 'أصلي'}</span>
        </div>
      </div>

      <div class="report-meta">
        <span class="label-text">رقم التقرير:</span>
        <code>${report.hash}</code>
      </div>

      <div class="report-meta">
        <span class="label-text">تاريخ الختم:</span> ${formatDate(report.createdAt)}
      </div>

      <div class="report-actions">
        <a class="mini-btn" href="${viewUrl}" target="_blank">عرض التقرير</a>
        <a class="mini-btn ghost" href="${verifyUrl}" target="_blank">رابط التحقق</a>
      </div>
    `;

    reportsListEl.appendChild(card);
  });
}

// --- تحميل التقارير ---
async function loadReports(){
  statusEl.textContent = 'جاري تحميل التقارير...';
  reportsListEl.innerHTML = '';

  try {
    const res = await fetch((API_BASE || '') + '/api/reports');
    if(!res.ok) throw new Error();
    const data = await res.json();

    allReports = Array.isArray(data.reports) ? data.reports : [];
    render(allReports);

  } catch {
    statusEl.textContent = 'تعذر تحميل التقارير، حاول لاحقاً.';
    totalCountEl.textContent = '0';
  }
}

// --- البحث ---
function applyFilter(){
  const term = searchInput.value.trim().toLowerCase();

  if(!term){
    render(allReports);
    return;
  }

  const filtered = allReports.filter(r =>
    (r.hash || '').toLowerCase().includes(term) ||
    (r.fileName || '').toLowerCase().includes(term)
  );

  render(filtered);
}

searchInput.addEventListener('input', applyFilter);
refreshBtn.addEventListener('click', loadReports);

loadReports();
</script>

</body>
</html>
